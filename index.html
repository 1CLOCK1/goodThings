<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星象旷课占卜</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        /* 基础设置与星空背景 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 0;
            background-color: #050505; 
            color: #e2e8f0; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 3D 地球的容器，放在最底层 */
        #globe-viz {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8; 
        }

        /* 蓝紫色的氛围光晕 */
        .glow-background {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* 主界面 - 磨砂玻璃质感 */
        .app-window {
            position: relative;
            z-index: 10;
            background: rgba(15, 15, 20, 0.5); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px;
            padding: 40px;
            width: 80%;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.2);
            animation: fadeIn 1.5s ease-out;
            transition: transform 0.3s ease; 
        }

        .app-window:hover {
            transform: scale(1.01);
        }

        h1 { 
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* 发光按钮 */
        button { 
            font-size: 16px;
            font-weight: 500;
            padding: 12px 30px; 
            background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(168,85,247,0.2) 100%);
            color: #ffffff; 
            border: 1px solid rgba(168,85,247,0.5); 
            border-radius: 8px;
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-bottom: 20px;
        }
        
        button:hover {
            background: linear-gradient(135deg, rgba(99,102,241,0.4) 0%, rgba(168,85,247,0.4) 100%);
            box-shadow: 0 0 20px rgba(168,85,247,0.4);
            transform: translateY(-2px);
        }

        /* 悬浮的数据卡片面板 */
        .dashboard {
            display: flex;
            justify-content: space-between; 
            gap: 20px; 
            margin-top: 20px;
        }

        /* 卫星一样的悬浮小卡片 */
        .card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05); 
            text-align: left;
            animation: float 6s ease-in-out infinite;
        }

        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 1s; }
        .card:nth-child(3) { animation-delay: 2s; }

        .card h3 { 
            margin-top: 0;
            color: #c084fc; 
            font-size: 14px; 
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 8px;
        }
        
        .card p { 
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6; 
            margin-bottom: 0;
        }

        /* 最终结果的文字样式 */
        #status { color: #818cf8; font-size: 14px; min-height: 20px;}
        #result-box { margin-top: 30px; min-height: 80px; }
        #final-result { 
            font-size: 24px;
            font-weight: 600; 
            color: #ffffff; 
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); 
            line-height: 1.4;
        }

        /* 动画定义区 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div id="globe-viz"></div>
    <div class="glow-background"></div>

    <div class="app-window">
        <h1>上课占卜仪</h1>
        <p class="subtitle">实时同步天气、历史与宇宙能量，为你指引方向。</p>
        
        <button onclick="startAdvancedDivination()">开启星际之门 & 开始测算</button>
        
        <div id="status"></div>

        <div class="dashboard" id="dashboard" style="display: none;">
            <div class="card">
                <h3>⛅ 天气雷达 (珠海)</h3>
                <p id="weather-text">正在连接卫星...</p>
            </div>
            <div class="card">
                <h3>📜 历史回音</h3>
                <p id="history-text">正在扫描时间线...</p>
            </div>
            <div class="card">
                <h3>✨ 宇宙轨迹</h3>
                <p id="astro-text">正在计算轨道...</p>
            </div>
        </div>

        <div id="result-box">
            <div id="final-result"></div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 第一部分：渲染背景的 3D 地球
        // ----------------------------------------------------
        const world = Globe()
            (document.getElementById('globe-viz'))
            // 使用图片来给地球贴图
            .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg') 
            .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
            .backgroundColor('rgba(0,0,0,0)') 
            // 调整视角，不然地球太大或者太小
            .pointOfView({ lat: 22.35, lng: 113.82, altitude: 1.8 });

        // 让地球自己慢慢转动
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;
        world.controls().enableZoom = false; 

        // ----------------------------------------------------
        // 第二部分：算命逻辑的大脑
        // ----------------------------------------------------
        
        // 算星座的公式
        function getZodiacSign(day, month) {
            const signs = ["摩羯座 ♑", "水瓶座 ♒", "双鱼座 ♓", "白羊座 ♈", "金牛座 ♉", "双子座 ♊", "巨蟹座 ♋", "狮子座 ♌", "处女座 ♍", "天秤座 ♎", "天蝎座 ♏", "射手座 ♐", "摩羯座 ♑"];
            const cutoffDates = [20, 19, 21, 20, 21, 22, 23, 23, 23, 24, 23, 22];
            return day < cutoffDates[month - 1] ? signs[month - 1] : signs[month];
        }

        // 算月亮的公式
        function getMoonPhase(day) {
            const phases = [
                "🌑 新月 (潜伏)", "🌒 蛾眉月 (上升)", "🌓 上弦月 (聚能)", 
                "🌔 盈凸月 (涌动)", "🌕 满月 (能量巅峰)", "🌖 亏凸月 (消退)", 
                "🌗 下弦月 (减弱)", "🌘 残月 (沉寂)"
            ];
            return phases[day % 8]; 
        }

        // 这是点击按钮后运行的流程
        async function startAdvancedDivination() {
            // 每次点击先把界面上的字清理成初始状态
            document.getElementById("status").innerText = "📡 正在接收宇宙信号...";
            document.getElementById("dashboard").style.display = "flex";
            document.getElementById("final-result").innerText = "";
            document.getElementById("weather-text").innerText = "正在加载数据...";
            document.getElementById("history-text").innerText = "正在加载数据...";
            
            // 拿今天的日子
            let today = new Date();
            let month = today.getMonth() + 1;
            let day = today.getDate();
            
            // 设置一个默认温度（比如珠海常见的25度），万一断网了，程序也有数字可以用来算命
            let temp = 25; 

            // 第一步：把星座和月相算出来放到界面上
            let currentZodiac = getZodiacSign(day, month);
            let currentMoon = getMoonPhase(day);
            document.getElementById("astro-text").innerHTML = "太阳位于: <br><strong style='color:#fff'>" + currentZodiac + "</strong><br><br>当前月相: <br><strong style='color:#fff'>" + currentMoon + "</strong>";

            // 第二步：尝试查天气（查不到就不管，用刚刚设置的25度）
            try {
                // 这里的坐标已经换成了珠海的经纬度 (纬度 22.27, 经度 113.57)
                let weatherRes = await fetch("https://api.open-meteo.com/v1/forecast?latitude=22.27&longitude=113.57&current_weather=true");
                let weatherData = await weatherRes.json(); 
                temp = weatherData.current_weather.temperature; 
                document.getElementById("weather-text").innerHTML = "当前温度: <strong style='color:#fff'>" + temp + "°C</strong><br><br>大气数据已记录。";
            } catch (error) {
                // 如果网络不好查不到，就在界面上显示这句话
                document.getElementById("weather-text").innerHTML = "网络波动，使用备用温度数据: <strong style='color:#fff'>" + temp + "°C</strong>";
            }

            // 第三步：尝试查历史上的今天（查不到就不管，显示神秘提示）
            try {
                let historyRes = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${month}/${day}`);
                let historyData = await historyRes.json();
                let historyEvent = historyData.events[0].text;
                let historyYear = historyData.events[0].year;
                document.getElementById("history-text").innerHTML = "<strong style='color:#fff'>年份 " + historyYear + ":</strong><br>" + historyEvent;
            } catch (error) {
                // 如果连不上维基百科查不到历史，就在界面上显示这句话
                document.getElementById("history-text").innerHTML = "时空乱流，无法读取过去，但未来仍掌握在你手中。";
            }

            // 第四步：给最终结果！无论前面网好不好，这一步都会运行。
            document.getElementById("status").innerText = "信号已锁定...";

            // 假装思考一会（1.5秒），然后把算出来的结果显示在屏幕最下面
            setTimeout(() => {
                document.getElementById("status").innerText = ""; 
                
                // 用温度、日期和随机数算出一个“能量值”
                let energyLevel = temp + day + Math.floor(Math.random() * 50);
                let resultText = "";
                
                // 如果能量值大于60就让旷课，不然就去上课
                if (energyLevel > 60) {
                    resultText = "上个蛋，直接旷。";
                } else {
                    resultText = "请立刻前往教室上课。";
                }
                
                document.getElementById("final-result").innerText = resultText;
            }, 1500);
        }
    </script>
</body>
</html>
